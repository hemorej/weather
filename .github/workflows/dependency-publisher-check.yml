name: Dependency publisher check

# Runs on any PR that touches the lockfile or package.json and flags
# newly-introduced package versions published by an npm account that
# hasn't published recent prior versions of that package — a strong
# signal of a hijacked-maintainer supply-chain compromise (this check
# was added after Dependabot proposed a fake typescript@7.0.2 release
# on another project).
on:
  pull_request:
    paths:
      - "pnpm-lock.yaml"
      - "package.json"

jobs:
  check-new-publishers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Check for unfamiliar npm publishers
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
        run: node scripts/check-new-publishers.mjs
